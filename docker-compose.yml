services:
  whatsapp-telegram-relay:
    build:
      context: /mnt/user/appdata/whatsapp_telegram_relay
      dockerfile: Dockerfile
    container_name: whatsapp-telegram-relay
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - /mnt/user/appdata/whatsapp_telegram_relay/auth_info:/app/auth_info
      - /mnt/user/appdata/whatsapp_telegram_relay/data:/app/data
    stdin_open: true
    tty: true